<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meet to Jira UI</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Meet to Jira Local UI</h1>

      <section class="card">
        <h2>1) Start Session</h2>
        <textarea id="transcript" rows="10" placeholder="Paste meeting transcript here..."></textarea>
        <button id="start-btn">Process Transcript</button>
      </section>

      <section class="card">
        <h2>2) Draft Review</h2>
        <div id="drafts"></div>
      </section>

      <section class="card">
        <h2>3) Raise Jira Tickets</h2>
        <button id="raise-btn" disabled>Raise Ready + Approved Tickets</button>
        <pre id="results"></pre>
      </section>
    </main>
    <script src="/assets/app.js"></script>
  </body>
</html>
